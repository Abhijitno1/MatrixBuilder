<html>
<head>
<title>BuddhaBrot using Javascript</title>
</head>
<body>
<canvas id="brotCanvas" width="800" height="900"></canvas>
<script>
const canvas = document.getElementById('brotCanvas');
const ctx = canvas.getContext('2d');
const width = canvas.width;
const height = canvas.height;

// Parameters for detail and performance
const maxIter = 500; 
const samplesPerFrame = 50000;

// Buffer to store hit counts for each pixel
const exposure = new Float32Array(width * height);
let maxExposure = 0;

function render() {
    for (let i = 0; i < samplesPerFrame; i++) {
        // 1. Pick a random point in the complex plane
        let x0 = Math.random() * 3.0 - 2.0;
        let y0 = Math.random() * 2.0 - 1.0;

        // 2. Track the orbit path
        let x = 0, y = 0;
        let iteration = 0;
        let path = [];

        while (x*x + y*y <= 4 && iteration < maxIter) {
            let xTemp = x*x - y*y + x0;
            y = 2*x*y + y0;
            x = xTemp;
            path.push({x, y});
            iteration++;
        }

        // 3. If it escapes, it contributes to the Buddha Brot
        if (iteration < maxIter) {
			for (let p of path) {
				// 1. Rotate 90° clockwise in a way that respects Canvas's top-down Y axis:
				// We want the original negative X (the head) to be at the top (low Y).
				// We want the original Y to become the new X.
				let rotX = p.y;   
				let rotY = -p.x;  

				// 2. Map to Canvas Coordinates
				// rotX (from original Y) is in range [-1.1, 1.1] -> Use width 2.2
				// rotY (from original -X) is in range [-1.1, 2.1] -> Use height 3.2
				
				// Horizontal: Center the 2.2-unit range
				let px = Math.floor((rotX + 1.1) / 2.2 * width);
				
				// Vertical: Center the 3.2-unit range 
				// This puts p.x = -2.0 at rotY = 2.0 (bottom) 
				// WAIT: To put the head (x = -0.1) at the TOP, we need high X to be low Y.
				// Let's use: py = (p.x + 1.1) / 3.2 * height; 
				// This maps x = -2.0 (bottom of set) to bottom of canvas and x = 1.0 to top.
				
				// FINAL CORRECT MAPPING:
				let py = Math.floor((p.x + 2.1) / 3.2 * height); 

				if (px >= 0 && px < width && py >= 0 && py < height) {
					let idx = py * width + px;
					exposure[idx]++;
					if (exposure[idx] > maxExposure) maxExposure = exposure[idx];
				}
			}        }
    }

    // 4. Draw the density map to the canvas
    const imgData = ctx.createImageData(width, height);
    for (let i = 0; i < exposure.length; i++) {
        // Logarithmic scaling for better contrast and detail
        let val = Math.log1p(exposure[i]) / Math.log1p(maxExposure) * 255;
        let pixelIdx = i * 4;
        imgData.data[pixelIdx] = val;     // Red
        imgData.data[pixelIdx + 1] = val; // Green
        imgData.data[pixelIdx + 2] = val; // Blue
        imgData.data[pixelIdx + 3] = 255; // Alpha
    }
    ctx.putImageData(imgData, 0, 0);
    
    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
